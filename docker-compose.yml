services:
  backend:
    build:
      context: ./docker/php
    container_name: mystique_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - mystique

  nginx:
    image: nginx:alpine
    container_name: mystique_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - mystique

  mysql:
    image: mysql:8.0
    container_name: mystique_mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mystique}
      MYSQL_USER: ${DB_USERNAME:-mystique}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mystique

  redis:
    image: redis:7-alpine
    container_name: mystique_redis
    ports:
      - "6379:6379"
    networks:
      - mystique

  reverb:
    build:
      context: ./docker/php
    container_name: mystique_reverb
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - backend
      - redis
    networks:
      - mystique

  frontend:
    build:
      context: ./docker/node
    container_name: mystique_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      # Proxy do Vite roda DENTRO do container → nginx na rede Docker.
      VITE_BACKEND_URL: http://nginx
      VITE_API_URL: /api
      VITE_REVERB_APP_KEY: mystique-key
      # Browser do host acessa Reverb pela porta publicada.
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: "8080"
      VITE_REVERB_SCHEME: http
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mystique

  demo-callback:
    build:
      context: ./docker/php
    container_name: mystique_demo_callback
    working_dir: /demo
    command: php -S 0.0.0.0:9090 callback-server.php
    ports:
      - "9090:9090"
    environment:
      DEMO_DB_HOST: mysql
      DEMO_DB_PORT: 3306
      DEMO_DB_DATABASE: ${DB_DATABASE:-mystique}
      DEMO_DB_USERNAME: ${DB_USERNAME:-mystique}
      DEMO_DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./docs/demo:/demo
    depends_on:
      - mysql
    networks:
      - mystique

networks:
  mystique:
    driver: bridge

volumes:
  mysql_data:
